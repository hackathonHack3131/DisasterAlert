server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: disaster-backend
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/disaster_db}
  mail:
    host: ${MAIL_HOST:smtp-relay.brevo.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:${GMAIL_USER:}}
    password: ${MAIL_PASSWORD:${GMAIL_APP_PASSWORD:}}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000

app:
  mail:
    from: ${MAIL_FROM:${GMAIL_USER:}}
    from-name: Smart Disaster Alert
    provider: ${MAIL_PROVIDER:auto}
  jwt:
    secret: ${JWT_SECRET:disaster-platform-super-secret-key-change-in-production-min-32-chars}
    expiration-ms: 86400000
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}
  openweather:
    api-key: ${OPENWEATHER_API_KEY:}
  nasa-firms:
    map-key: ${NASA_FIRMS_MAP_KEY:}
  google:
    api-key: ${GOOGLE_API_KEY:}
  gee:
    service-url: ${GEE_SERVICE_URL:http://localhost:5050}
  twilio:
    account-sid: ${TWILIO_ACCOUNT_SID:}
    auth-token: ${TWILIO_AUTH_TOKEN:}
    phone-number: ${TWILIO_PHONE_NUMBER:}
  integrations:
    auto-ingest: ${AUTO_INGEST:false}
